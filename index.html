<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="javascript.js" defer></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" media="screen" href="https://fontlibrary.org//face/segment7" type="text/css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rowdies:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="together">
        <div class="top">
            <div class="display">
                
                <button class="screen"></button>
                <div class="digits-container">
                        <div class="threes">
                                  <div class="three-1">
                                    <button class="7">7</button>
                                    <button class="8">8</button>
                                    <button class="9">9</button>
                                </div>
                                <div class="three-2">
                                    <button class="4">4</button>
                                    <button class="5">5</button>
                                    <button class="6">6</button>
                                </div>
                                <div class="three-3">
                                    <button class="1">1</button>
                                    <button class="2">2</button>
                                    <button class="3">3</button>
                                </div>
                                <div class="num-0">
                                    <button class="0">0</button>
                                </div>
                        </div>
                         
                  
                   
                    
                  
                   
                </div>
                <div class="operands-container">
                        <button class="add">+</button>
                        <button class="subtract">-</button>
                        <button class="divide">/</button>
                        <button class="multiply">*</button>       
                        <button class="clear">clear</button>
                        <button class="equals">=</button>
                </div>
                
            </div>
        </div>

        </div>
    </div>
